name: minibwa_index
namespace: minibwa
description: |
  Build a minibwa index (2-bit encoded sequence and BWT/suffix array) from a
  reference FASTA file, for use with `minibwa_map`. Optionally also builds a
  bisulfite (BS-seq) index for directional bisulfite sequencing alignment.
keywords: [alignment, indexing, minibwa, BWA, BWA-MEM, reference]
links:
  homepage: https://github.com/lh3/minibwa
  documentation: https://github.com/lh3/minibwa#readme
  repository: https://github.com/lh3/minibwa
references:
  doi: 10.48550/arXiv.2606.15357
license: GPL-2.0-or-later
requirements:
  commands: [minibwa]
authors:
  - __merge__: /src/_authors/luke_zappia.yaml
    roles: [author, maintainer]

argument_groups:
- name: "Input"
  arguments:
  - name: "--input"
    type: file
    description: Input reference FASTA file to be indexed.
    required: true
    example: reference.fasta

- name: "Output"
  arguments:
  - name: "--output"
    type: file
    direction: output
    description: |
      Output directory containing the minibwa index files (`.l2b`, `.mbw`,
      and `.meth.mbw` when `--meth` is used).
    example: minibwa_index/

- name: "Options"
  arguments:
  - name: "--prefix"
    type: string
    description: |
      Prefix of the index files. Default is the same as the input FASTA file
      name.
  - name: "--low_memory"
    alternatives: [-l]
    type: boolean_true
    description: |
      Use a low-memory GPL'd algorithm for BWT construction, trading
      performance for reduced memory use.
  - name: "--block_size"
    alternatives: [-b]
    type: string
    description: |
      Block size, effective only when `--low_memory` is set.
    default: 10m
  - name: "--random_seed"
    alternatives: [-s]
    type: integer
    description: Random seed used to resolve ambiguous bases.
    default: 11
  - name: "--sa_sample_rate"
    alternatives: [-u]
    type: integer
    description: |
      Suffix array sample rate, at a rate of `1/(1<<INT)`.
    default: 4
  - name: "--meth"
    type: boolean_true
    description: |
      Additionally build a bisulfite (BS-seq) FM-index (`.meth.mbw`).

resources:
  - type: bash_script
    path: script.sh

test_resources:
  - type: bash_script
    path: test.sh
  - path: /src/_utils/test_helpers.sh

engines:
  - type: docker
    image: quay.io/biocontainers/minibwa:0.4--hab16a5f_0
    setup:
      - type: docker
        run: |
          minibwa version 2>&1 | sed 's/^/minibwa: /' > /var/software_versions.txt

runners:
  - type: executable
  - type: nextflow
