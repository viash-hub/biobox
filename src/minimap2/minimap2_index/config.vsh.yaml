name: minimap2_index
namespace: minimap2
description: |
  Provides fasta index required by minimap2 alignment.
  Create a minimap2 index (.mmi) from a FASTA reference.
  This component uses minimap2's `-d` flag to create an index file (.mmi).
keywords: [Alignment, Indexing, Minimap2]
links:
  homepage: https://lh3.github.io/minimap2/
  documentation: https://github.com/lh3/minimap2#uguide
  repository: https://github.com/lh3/minimap2
references:
  doi:
    - 10.1093/bioinformatics/bty191
    - 10.1093/bioinformatics/btab705
license: MIT
authors:
  - __merge__: /src/_authors/marilyn_degraeve.yaml
    roles: [author, maintainer]

requirements:
  commands: [minimap2]

argument_groups:
  - name: Inputs
    arguments:
    - name: --input
      alternatives: -i
      type: file
      description: |
        Reference database file in FASTA format.
      required: true
      example: reference.fasta

  - name: Outputs
    arguments:
      - name: --output
        alternatives: -o
        type: file
        direction: output
        description: |
          Output Minimap2 index in .mmi format.
        required: true
        example: reference.mmi

resources:
  - type: bash_script
    path: script.sh

test_resources:
  - type: bash_script
    path: test.sh
  - path: /src/_utils/test_helpers.sh

engines:
  - type: docker
    image: quay.io/biocontainers/minimap2:2.30--h577a1d6_0
    setup:
      - type: docker
        run: |
          minimap2 --version | head -1 | sed 's/^/minimap2: /' > /var/software_versions.txt

runners:
  - type: executable
  - type: nextflow
