name: minimap2_align
namespace: minimap2
description: |
  A versatile pairwise aligner for genomic and spliced nucleotide sequences.
  This component maps DNA or mRNA query sequences against a reference database (FASTA or .mmi index).
  By default, it outputs mapping coordinates in PAF format. If the --bam flag is provided, it outputs a sorted and indexed BAM file.
keywords: [Alignment, Mapper, Minimap2]
links:
  homepage: https://lh3.github.io/minimap2/
  documentation: https://github.com/lh3/minimap2#uguide
  repository: https://github.com/lh3/minimap2
references:
  doi: 
    - 10.1093/bioinformatics/bty191
    - 10.1093/bioinformatics/btab705
license: MIT
authors:
  - __merge__: /src/_authors/marilyn_degraeve.yaml
    roles: [author, maintainer]

requirements:
  commands: [minimap2]

argument_groups:
  - name: Inputs
    arguments:
      - name: --reference
        alternatives: [-i, --input]
        type: file
        description: Reference fasta or .mmi index.
        required: true
        example: reference.fasta
      - name: --query
        alternatives: [-q]
        type: file
        description: Query sequences (FASTQ/FASTA).
        required: true
        example: reads.fastq
  
  - name: Options
    arguments:
      - name: --preset
        alternatives: -x
        type: string
        description: |
          Preset alignment options:
          - map-ont: Oxford Nanopore genomic reads
          - map-hifi: PacBio HiFi/CCS genomic reads
          - sr: Short single-end reads
          - splice: spliced alignment (long-read cotranscriptomic)
        example: map-ont

  - name: Outputs
    arguments:
      - name: --bam
        type: boolean
        description: Output BAM instead of PAF.
        default: false
      - name: --cigar_paf
        type: boolean
        description: Output CIGAR in PAF format (-c flag).
        default: false
      - name: --cigar_bam
        type: boolean
        description: Write long CIGARs in BAM CG tag (-L flag).
        default: false
      - name: --output
        alternatives: -o
        type: file
        direction: output
        description: Output alignment file in PAF (default) or BAM format.
        required: true
        example: alignment.paf

resources:
  - type: bash_script
    path: script.sh

test_resources:
  - type: bash_script
    path: test.sh
  - type: file
    path: ../test_data  #src/minimap2/test_data

engines:
  - type: docker
    image: python:3.12
    setup:
    - type: apt
      packages: [ wget, gcc, make, libbz2-dev, zlib1g-dev, libncurses5-dev, libncursesw5-dev, liblzma-dev, bzip2]
    - type: docker
      run: | # Install Samtools 1.21 and Minimap2 2.30
        wget -q https://github.com/samtools/samtools/releases/download/1.21/samtools-1.21.tar.bz2 && \
        tar jxf samtools-1.21.tar.bz2 && \
        rm samtools-1.21.tar.bz2 && \
        cd samtools-1.21 && \
        ./configure --prefix=/usr/local && \
        make && \
        make install && \
        cd .. && \
        rm -rf samtools-1.21 && \
        wget -q https://github.com/lh3/minimap2/releases/download/v2.30/minimap2-2.30_x64-linux.tar.bz2 && \
        tar jxf minimap2-2.30_x64-linux.tar.bz2 && \
        rm minimap2-2.30_x64-linux.tar.bz2 && \
        mv minimap2-2.30_x64-linux/minimap2 /usr/local/bin/ && \
        rm -rf minimap2-2.30_x64-linux

runners:
  - type: executable
  - type: nextflow
